spring.application.name=todo-list

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
app.chat.memory.redis-ttl-days=${CHAT_MEMORY_REDIS_TTL_DAYS:7}
app.chat.default-conversation-id=${CHAT_DEFAULT_CONVERSATION_ID:00000000-0000-0000-0000-000000000001}

spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai/v1
# spring.ai.openai.chat.model=llama-3.1-8b-instant
spring.ai.openai.chat.model=llama-3.3-70b-versatile

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0